# CloudCannon configuration for Samuel Oso portfolio
# Static HTML site configuration with Jekyll support

# Source and output directories
source: .
output: .

# Build settings
build:
  # No build command needed for static files
  commands: []

# Timezone settings
timezone: Africa/Lagos

# Markdown configuration
markdown:
  engine: kramdown
  options:
    heading_ids: false
    gfm: false
    breaks: false
    typographer: false
    attributes: true
    attribute_elements:
      inline: right
      block: below
      tr: none
      td: none
      li: right-of-prefix
    treat_indentation_as_code: true

# Data files configuration
data_config:
  portfolio_data: portfolio-data.js
  site_content: _data/site.yml

# Editable fields in HTML
_editables:
  content:
    - block: 'h1, h2, h3, h4, h5, h6'
    - block: 'p'
    - block: 'span'
    - block: 'strong'

# Paths to ignore from CloudCannon
ignore_paths:
  - node_modules
  - ".git"
  - ".gitignore"
  - ".github"
  - "*.map"

# Disable asset syncing for unnecessary files
ignore_patterns:
  - "^\."
  - "^\#"
  - "(^|/)vendor($|/)"

# Snippets and Collections configuration
_snippets_imports:
  jekyll: true

collections_config:
  pages:
    path: ''
    icon: wysiwyg

